name: Python CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal tooling
        run: python -m pip install --upgrade pip pytest
      - name: Syntax check
        run: python -m compileall app healthsense src
